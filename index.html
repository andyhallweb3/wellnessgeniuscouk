    <!-- JSON-LD: FAQPage (AEO-optimised) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Wellness Genius?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wellness Genius is an AI-powered business intelligence platform built specifically for fitness, wellness, and hospitality operators. It provides a strategic AI business advisor (called Genie), an AI Readiness Assessment, industry benchmarks, and downloadable playbooks to help gym owners, spa managers, and studio founders increase member retention, optimise pricing, and scale profitably. It is used by 500+ operators and followed by 16,000+ industry leaders."
          }
        },
        {
          "@type": "Question",
          "name": "How can AI help a gym or fitness business?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI can help gym and fitness businesses in several practical ways: (1) Identifying members at risk of cancelling before they leave, enabling targeted retention campaigns. (2) Optimising membership pricing and class schedules based on demand patterns. (3) Automating routine member communications such as re-engagement emails and milestone messages. (4) Analysing revenue per square metre to improve space utilisation. (5) Generating data-driven answers to strategic questions about staffing, marketing spend, and expansion timing. Wellness Genius provides an AI advisor trained on wellness industry data to help operators act on these opportunities."
          }
        },
        {
          "@type": "Question",
          "name": "What is an AI Readiness Assessment for a wellness business?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI Readiness Assessment for a wellness business evaluates how prepared the organisation is to adopt and benefit from artificial intelligence. It scores the business across five pillars: Leadership & Strategy, Data Infrastructure, People & Culture, Processes & Operations, and Risk & Governance. The result is a score out of 100 with a maturity band (from Foundational to Leading), plus a prioritised action plan. The Wellness Genius AI Readiness Assessment takes 5-7 minutes and is free to complete."
          }
        },
        {
          "@type": "Question",
          "name": "How much does the Wellness Genius AI Advisor cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Wellness Genius AI Advisor starts with a free trial of 10 sessions — no credit card required. After the trial, credits are available on a pay-as-you-go basis: £9 for 50 credits, £19 for 150 credits, or £49 for 500 credits. Each message costs 1 credit. There is no monthly subscription required. Consulting services start from £1,500."
          }
        },
        {
          "@type": "Question",
          "name": "How is Wellness Genius different from ChatGPT for wellness businesses?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wellness Genius differs from ChatGPT in three key ways: (1) Industry specificity — it is trained on wellness business data, benchmarks, and operational best practices rather than general internet content. (2) Business memory — it remembers your business name, type, goals, and key metrics across every session, so you never repeat yourself. (3) Specialised modes — it has 15 advisory modes tailored to specific tasks, from quick operational questions to board-ready strategic analysis, market research, and competitor positioning."
          }
        },
        {
          "@type": "Question",
          "name": "What is gym member retention and how can it be improved?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gym member retention refers to the percentage of members who continue their membership over a given period. Industry benchmarks typically show that gyms retain between 60-80% of members annually, though this varies by business model and location. Retention can be improved by: identifying at-risk members early using attendance data; strengthening the first 90 days of membership with structured onboarding; reintroducing lapsed members through targeted re-engagement campaigns; and aligning class schedules to peak demand times. Wellness Genius provides AI-powered analysis to help operators pinpoint their specific retention gaps."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Andy Hall from Wellness Genius?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Andy Hall is the founder and CEO of Wellness Genius and Chair of the Global Wellness Institute AI Initiative. He is an AI strategist and wellness industry consultant who has worked with 500+ fitness and wellness operators across the UK and internationally. He has 16,000+ LinkedIn followers in the wellness and fitness industry and publishes regular insights on AI automation and wellness business growth."
          }
        },
        {
          "@type": "Question",
          "name": "Does Wellness Genius work for small fitness businesses or only large operators?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wellness Genius is designed for fitness and wellness operators of all sizes — from single-site boutique studios and independent gym owners to multi-site operators and wellness hotel groups. The AI Advisor adapts its advice to the size, business model, and specific challenges of each operator. The free trial and pay-as-you-go pricing make it accessible without the commitment of an enterprise contract."
          }
        }
      ]
    }
